name: Scraper quotidien — Blogz Des Fous Crazy

on:
  schedule:
    - cron: "0 12 * * *"   # tous les jours à 12h UTC (14h heure française)
  workflow_dispatch:        # lancement manuel depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    # Permission d'écrire dans le dépôt (pour committer articles.json)
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le scraper
        run: python scraper.py

      - name: Committer articles.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          # Committer seulement si le fichier a changé
          git diff --staged --quiet || git commit -m "🤖 Scrape $(date +'%d/%m/%Y %H:%M')"
          git push
